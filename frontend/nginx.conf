server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ---- Statik frontend (HTML/CSS/JS) — nginx o'zi beradi ----
    location = / {
        # Token cookie bo'lmasa, kirish sahifasiga yo'naltiramiz
        if ($http_cookie !~* "access_token") {
            return 302 /login.html;
        }
        try_files /index.html =404;
    }

    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location = /login.html {
        try_files /login.html =404;
    }

    # ---- Backendga proxy (API, auth, health) ----
    location /api/ {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Login POST formasi (action="/login")
    location = /login {
        proxy_pass http://backend:8001/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /logout {
        proxy_pass http://backend:8001/logout;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /health {
        proxy_pass http://backend:8001/health;
        proxy_set_header Host $host;
    }

    # Boshqa barcha so'rovlar — frontend fayllari
    location / {
        try_files $uri $uri/ /index.html;
    }
}
