<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrendWear — Kirish</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-1:#38bdf8; --sky-2:#0ea5e9; --sky-deep:#0369a1;
    --rose-1:#fb7185; --rose-2:#f43f5e; --rose-soft:#fecdd3;
    --ink:#0f172a; --muted:#64748b; --card:#ffffff;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Inter',sans-serif; min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(1200px 600px at 12% 10%, rgba(56,189,248,.45), transparent 55%),
      radial-gradient(900px 600px at 88% 90%, rgba(251,113,133,.45), transparent 55%),
      linear-gradient(135deg, #eff6ff 0%, #fdf2f8 100%);
    padding:24px; position:relative; overflow:hidden;
  }
  .blob{position:absolute; border-radius:50%; filter:blur(60px); opacity:.5; z-index:0}
  .blob.a{width:340px;height:340px;background:var(--sky-1);top:-80px;left:-60px}
  .blob.b{width:300px;height:300px;background:var(--rose-1);bottom:-90px;right:-70px}
  .card{
    position:relative; z-index:1; width:100%; max-width:420px;
    background:rgba(255,255,255,.82); backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,.7); border-radius:24px;
    padding:42px 36px; box-shadow:0 25px 60px -15px rgba(14,116,144,.35);
  }
  .logo{display:flex; align-items:center; gap:12px; margin-bottom:28px}
  .logo .mark{
    width:46px;height:46px;border-radius:14px;
    background:linear-gradient(135deg,var(--sky-2),var(--rose-2));
    display:grid;place-items:center;color:#fff;font-weight:800;font-size:20px;
    font-family:'Sora',sans-serif; box-shadow:0 8px 20px -6px rgba(244,63,94,.5);
  }
  .logo h1{font-family:'Sora',sans-serif;font-size:20px;color:var(--ink);font-weight:800;letter-spacing:-.02em}
  .logo p{font-size:12px;color:var(--muted)}
  .welcome{font-family:'Sora',sans-serif;font-size:26px;font-weight:700;color:var(--ink);margin-bottom:6px;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:14px;margin-bottom:26px}
  label{display:block;font-size:13px;font-weight:600;color:#334155;margin-bottom:7px}
  .field{margin-bottom:18px}
  input{
    width:100%;padding:13px 15px;border:1.5px solid #e2e8f0;border-radius:12px;
    font-size:15px;font-family:inherit;transition:.2s;background:#fff;
  }
  input:focus{outline:none;border-color:var(--sky-2);box-shadow:0 0 0 4px rgba(56,189,248,.18)}
  .btn{
    width:100%;padding:14px;border:none;border-radius:12px;color:#fff;
    font-family:'Sora',sans-serif;font-weight:700;font-size:15px;cursor:pointer;
    background:linear-gradient(135deg,var(--sky-2) 0%,var(--rose-2) 100%);
    box-shadow:0 12px 28px -8px rgba(244,63,94,.5);transition:.2s;margin-top:6px;
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 18px 36px -10px rgba(244,63,94,.6)}
  .err{background:#fef2f2;color:#b91c1c;padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:18px;border:1px solid #fecaca}
  .hint{margin-top:22px;text-align:center;font-size:12.5px;color:var(--muted);line-height:1.6}
  .hint code{background:#f1f5f9;padding:2px 7px;border-radius:6px;font-weight:600;color:var(--sky-deep)}
</style>
</head>
<body>
  <div class="blob a"></div>
  <div class="blob b"></div>
  <div class="card">
    <div class="logo">
      <div class="mark">TW</div>
      <div>
        <h1>TrendWear</h1>
        <p>Distribution Ltd · Bulutli platforma</p>
      </div>
    </div>
    <div class="welcome">Xush kelibsiz</div>
    <div class="sub">ERP · CRM · WMS tizimiga kirish uchun ma'lumotlaringizni kiriting</div>
    <div class="err" id="err" style="display:none">Login yoki parol noto'g'ri</div>
    <form method="post" action="/login">
      <div class="field">
        <label>Foydalanuvchi nomi</label>
        <input name="username" placeholder="admin" autocomplete="username" required>
      </div>
      <div class="field">
        <label>Parol</label>
        <input name="password" type="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button class="btn" type="submit">Tizimga kirish</button>
    </form>
    <div class="hint">
      Demo kirish: <code>admin</code> / <code>admin123</code>
    </div>
  </div>
  <script>
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('err').style.display = 'block';
    }
  </script>
</body>
</html>
