# nginx konfiguratsiyasi — bitta konteyner uchun (nginx + uvicorn birgalikda)
# Backend 127.0.0.1:8001 da ishlaydi (Docker DNS kerak emas)

server {
    listen 8000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Port saqlanishi uchun — redirect da $host:$server_port ishlatiladi
    port_in_redirect on;
    absolute_redirect off;

    # ---- Statik frontend (HTML/CSS/JS) — nginx o'zi beradi ----
    location = / {
        if ($http_cookie !~* "access_token") {
            return 302 $scheme://$host:$server_port/login.html;
        }
        try_files /index.html =404;
    }

    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location = /login.html {
        try_files /login.html =404;
    }

    # ---- Swagger UI / OpenAPI ----
    location = /docs {
        proxy_pass http://127.0.0.1:8001/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /redoc {
        proxy_pass http://127.0.0.1:8001/redoc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /openapi.json {
        proxy_pass http://127.0.0.1:8001/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---- Backendga proxy ----
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    location = /login {
        proxy_pass http://127.0.0.1:8001/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /logout {
        proxy_pass http://127.0.0.1:8001/logout;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8001/health;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
