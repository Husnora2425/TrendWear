# TrendWear Cloud Platform
# Ishga tushirish:  docker compose up --build
# Hammasi BITTA portda:  http://localhost:8000
#
# Arxitektura:
#   frontend (nginx)  -> host 8000  : statik UI beradi + /api,/login,/logout,/health ni backendga uzatadi
#   backend  (FastAPI) -> ichki 8001 : faqat REST API + autentifikatsiya
#   db       (Postgres) -> ichki 5432 : ma'lumotlar bazasi

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trendwear-backend
    expose:
      - "8001"                # faqat ichki tarmoq (tashqariga ochilmaydi)
    environment:
      - DATABASE_URL=postgresql://trendwear:trendwear@db:5432/trendwear
      - SECRET_KEY=trendwear-prod-secret-key
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trendwear-frontend
    ports:
      - "8000:80"             # YAGONA tashqi port — UI ham, API ham shu yerdan
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: trendwear-db
    environment:
      POSTGRES_USER: trendwear
      POSTGRES_PASSWORD: trendwear
      POSTGRES_DB: trendwear
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pg_data:
